<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Reconcile">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2548"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g stroke="#5ee0c4" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round">
    <line x1="20" y1="44" x2="44" y2="44"/>
    <line x1="20" y1="44" x2="32" y2="22"/>
    <line x1="44" y1="44" x2="32" y2="22"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="32" cy="22" r="5.5" fill="#5ee0c4"/>
    <circle cx="20" cy="44" r="5.5" fill="#6cc9f7"/>
    <circle cx="44" cy="44" r="5.5" fill="#ffc850"/>
  </g>
</svg>
